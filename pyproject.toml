# Code-quality configuration. The enforced gate is `bin/lint` (and the
# pre-commit hooks); see CODE_QUALITY.md for the threshold ratchet plan.
#
# Structural thresholds live here where the tool reads them:
#   - complexity (mccabe C901)        : pylint/mccabe sections below
#   - arguments / statements / nesting: [tool.ruff.lint.pylint] below
#   - file length / function length   : tools/quality_checks.py (ruff has no rule)
# Current strict-but-staged values are 50-line functions / 500-line files / args<=4,
# ratcheting toward 10-line functions / 100-line files. Tighten in lockstep.

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["guide", ".venv"]

[tool.ruff.lint]
select = [
    "E", "W",      # pycodestyle
    "F",           # pyflakes
    "I",           # isort
    "UP",          # pyupgrade
    "B",           # flake8-bugbear
    "C4",          # flake8-comprehensions
    "SIM",         # flake8-simplify
    "RET",         # flake8-return
    "ARG",         # flake8-unused-arguments
    "PIE",         # flake8-pie
    "RUF",         # ruff-specific
    "C901",        # mccabe cyclomatic complexity
    "PLC", "PLE", "PLR", "PLW",  # pylint
]
ignore = [
    "PLR2004",     # magic-value-comparison — pervasive and meaningful in RTT math
    "RUF001", "RUF002", "RUF003",  # "ambiguous" unicode: the math notation (𝒈 ⟨ ⟩ …) is intentional
    "SIM117",      # nested `with` expresses NiceGUI parent/child element context — clearer nested
    # E501 (line length) is DEFERRED, coupled with `ruff format` — re-enabled together by the
    # parked line-wrap / decomposition campaign (500→250→100). Wrapping the dense view modules'
    # long render lines to ≤100 chars pushes them past the 500-line cap, so line-length and
    # file-length can't both hold for that code until it is decomposed further. The notation
    # strings (never-wrap) and comment-scrub lines also live here. See CODE_QUALITY.md.
    "E501",
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 4
max-nested-blocks = 4
max-statements = 50
max-branches = 12
max-returns = 6

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401", "F403", "F405"]
"tests/**/*.py" = ["ARG", "PLR0913", "PLR0915", "C901", "PLR0912", "E501", "SIM", "B011"]
# args<=4 is the default, but the math/geometry/compute-dense modules legitimately take
# several scalar/array/flag params; bundling them into objects obscures rather than clarifies
# (and threading objects through the delicate renderer is riskier than it's worth). So PLR0913
# is relaxed per-file here, NOT globally — a plain new module is still held to <=4.
"rtt/library/tuning*.py" = ["PLR0913"]
"rtt/library/matrix_utils.py" = ["PLR0913"]
"rtt/app/spreadsheet*.py" = ["PLR0913"]
"rtt/app/render_html*.py" = ["PLR0913"]
"rtt/app/marks.py" = ["PLR0913"]
"rtt/app/service/*.py" = ["PLR0913"]
# The view/reconciler layer carved out of app.py — same render-dense scalar/flag params
# (cell id, css class, text parts, viewport coordinates x/y/w/h, draw-state flags).
"rtt/app/_recon_*.py" = ["PLR0913"]
"rtt/app/_editing_*.py" = ["PLR0913"]
"rtt/app/building.py" = ["PLR0913"]
"rtt/app/gestures.py" = ["PLR0913"]
"rtt/app/rendering.py" = ["PLR0913"]

[tool.ruff.format]
# These render/data-dense view modules are NOT format-checked: `ruff format` wraps their long
# cell/SVG-assembly lines to ≤100 chars, which pushes them past a length cap (the 500-line file
# cap, or the 50-line function cap for the resolve/decoration builders). Line-length (E501) and
# those caps can't both hold for this code until the parked 500→250→100 decomposition splits it
# further, so format is DEFERRED here in lockstep with E501 (see the E501 note above and
# CODE_QUALITY.md). Every other module IS format-checked.
exclude = [
    "rtt/app/grid_tables.py",
    "rtt/app/tooltips.py",
    "rtt/app/page_assets.py",
    "rtt/app/gestures.py",
    "rtt/app/rendering.py",
    "rtt/app/spreadsheet_geometry.py",
    "rtt/app/spreadsheet_layout.py",
    "rtt/app/spreadsheet_resolve.py",
    "rtt/app/spreadsheet_brackets.py",
    "rtt/app/spreadsheet_controls.py",
    "rtt/app/spreadsheet_decorations.py",
    "rtt/app/spreadsheet_models.py",
    "rtt/app/spreadsheet_emit_matrix.py",
    "rtt/app/spreadsheet_emit_mapping.py",
    "rtt/app/spreadsheet_emit_vectors.py",
    "rtt/app/spreadsheet_emit_tuning.py",
]

# The branch-coverage gate is scoped to the LOGIC tiers only — the pure-math
# library and the headless app-service layer — which fast, deterministic unit
# tests exercise. The view layer (app.py, render_html.py, spreadsheet_*, marks,
# tooltips) is guarded by the render integration tests as BEHAVIOUR tests, not by
# a line percentage; measuring it here would force those slow, profiler-fragile
# page-render tests to carry line coverage for SVG/DOM string assembly.
[tool.coverage.run]
branch = true
source = ["rtt/library", "rtt/app/service"]

[tool.coverage.report]
fail_under = 95
show_missing = true
exclude_also = [
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "@(abc\\.)?abstractmethod",
]
