name: merge gate (full render suite)

# Visible, un-spoofable backstop to the local merge protocol: re-run the WHOLE suite
# — including the 171 in-process page-render tests — on every push to main and on PRs
# targeting it. The local green-gate guard (bin/merge-guard-hook) makes an ungated
# red web change impossible to LAND; this makes it impossible to land UNNOTICED — if a
# red tree ever reaches main, this job goes red where everyone can see it.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run the full suite (library + app + render)
        env:
          RTT_RENDER_GATE_NOLOCK: "1"   # CI is the sole gater — no cross-agent semaphore needed
        run: python -m pytest -q
